<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MemoryCraft - Memory Mode</title>
  <style>
    :root {
      --bg-primary: #eaf7ff;
      --bg-panel: #fff;
      --bg-input: #fff;
      --bg-row: #fff;
      --bg-button: #fff;
      --text-primary: #111;
      --text-secondary: #666;
      --border-color: #000;
      --shadow-color: #00000014;
    }

    body.dark-mode {
      --bg-primary: #1a1a1a;
      --bg-panel: #2a2a2a;
      --bg-input: #333;
      --bg-row: #2a2a2a;
      --bg-button: #333;
      --text-primary: #e5e5e5;
      --text-secondary: #a0a0a0;
      --border-color: #444;
      --shadow-color: #00000040;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    header {
      position: relative;
      padding: 16px 20px;
      background: #39a845;
      border-bottom: 2px solid #000;
    }

    .header-title-row {
      min-height: 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 0 52px;
    }

    @media (min-width: 600px) {
      .header-title-row {
        flex-direction: row;
        gap: 12px;
      }
    }

    h1 {
      margin: 0;
      color: #fff;
      font-weight: 700;
            font-size: 2rem;
text-shadow:
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px 2px 0 #000,
        2px 2px 0 #000;
    }

    .header-progress {
      margin: 0;
      color: #fff;
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
      text-shadow:
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px 2px 0 #000,
        2px 2px 0 #000;
    }

    .icon-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      color: #000;
      border: 2px solid #000;
      border-radius: 6px;
      background: #fff;
      padding: 0;
      cursor: pointer;
    }

    .icon-btn:hover {
      background: #f2f2f2;
    }

    .back-link {
      left: 12px;
    }

    .settings-btn {
      right: 12px;
      width: 36px;
      height: 36px;
    }

    .settings-btn svg {
      width: 20px;
      height: 20px;
    }

    .header-timer {
      position: absolute;
      right: 56px;
      top: 50%;
      transform: translateY(-50%);
      color: #fff;
      font-weight: 800;
      font-size: 1rem;
      text-shadow:
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px 2px 0 #000,
        2px 2px 0 #000;
    }

    .header-timer[hidden] {
      display: none;
    }

    .settings-overlay {
      position: fixed;
      inset: 0;
      z-index: 9998;
      pointer-events: auto;
      background: #00000066;
    }

    .settings-box {
      position: fixed;
      top: 50%;
      left: 50%;
      z-index: 9999;
      pointer-events: auto;
      transform: translate(-50%, -50%);
      width: min(460px, calc(100vw - 32px));
      background: var(--bg-panel);
      border: 2px solid var(--border-color);
      border-radius: 10px;
      padding: 22px;
      box-shadow: 0 10px 30px #00000040;
      color: var(--text-primary);
    }

    .settings-box * {
      pointer-events: auto;
    }

    .settings-box h2 {
      margin: 0 0 10px;
      font-size: 1.4rem;
    }

    .settings-box p {
      margin: 0 0 14px;
    }

    .reset-progress {
      width: 100%;
      min-height: 48px;
      margin: 6px 0 10px;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      background: #fee2e2;
      color: #7f1d1d;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      z-index: 1;
    }

    .reset-progress:hover {
      background: #fecaca;
    }

    .reset-progress:active {
      background: #fca5a5;
    }

    body.dark-mode .reset-progress {
      background: #7f1d1d;
      color: #fee2e2;
    }

    .select-filter {
      width: 100%;
      min-height: 48px;
      margin: 0 0 10px;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      background: #dbeafe;
      color: #1e3a8a;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      z-index: 1;
    }

    .select-filter:hover {
      background: #bfdbfe;
    }

    .select-filter:active {
      background: #93c5fd;
    }

    body.dark-mode .select-filter {
      background: #1e3a8a;
      color: #dbeafe;
    }

    .close-settings {
      border: 2px solid var(--border-color);
      background: var(--bg-button);
      color: var(--text-primary);
      padding: 8px 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      border-radius: 8px;
      position: relative;
      z-index: 1;
    }

    .close-settings:hover {
      opacity: 0.8;
    }


    main {
      max-width: 760px;
      margin: 24px auto;
      padding: 0 20px;
    }

    .game-panel {
      padding: 0;
    }

    .guess-row {
      position: sticky;
      top: 8px;
      z-index: 20;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 8px 0;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 4px 12px var(--shadow-color);
      border-radius: 8px;
    }

    #mob-input {
      flex: 1 1 260px;
      min-height: 56px;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-input);
      color: var(--text-primary);
      padding: 10px 12px;
      font: inherit;
    }

    #submit-guess {
      min-height: 56px;
      border: 2px solid #000;
      border-radius: 8px;
      padding: 10px 14px;
      background: #39a845;
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    #guess-message {
      margin: 8px 0 0;
      font-weight: 700;
      min-height: 1.3em;
    }

    .mob-board {
      margin-top: 16px;
      display: grid;
      gap: 6px;
    }

    .mob-row {
      display: grid;
      grid-template-columns: 28px 1fr 58px;
      gap: 8px;
      align-items: center;
      min-height: 62px;
      padding: 6px 8px;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-row);
    }

    .mob-num {
      font-weight: 700;
      color: var(--text-secondary);
      text-align: center;
    }

    .mob-name {
      min-height: 1.2em;
      font-weight: 700;
    }

    .mob-row:not(.guessed) .mob-name {
      color: transparent;
      user-select: none;
    }


    .mob-sprite {
      width: 56px;
      height: 56px;
      object-fit: contain;
      justify-self: end;
      opacity: 0;
    }

    .mob-row.guessed .mob-sprite {
      opacity: 1;
    }

    .mob-row.focused {
      outline: 3px solid #22c55e;
      outline-offset: 2px;
    }


    .win-overlay {
      position: fixed;
      inset: 0;
      z-index: 10020;
      background: #00000088;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
    }

    .win-overlay[hidden] {
      display: none;
    }

    .win-content {
      width: min(560px, calc(100vw - 32px));
      min-height: min(68vh, 520px);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
    }

    .win-title {
      margin: 0;
      color: #fff;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3.5rem;
      font-weight: 800;
      text-shadow:
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px 2px 0 #000,
        2px 2px 0 #000;
    }

    .confetti {
      position: absolute;
      width: 74px;
      height: 74px;
      color: #facc15;
      filter: drop-shadow(0 2px 0 #000);
    }

    .confetti.tl { top: 10px; left: 10px; transform: rotate(25deg); }
    .confetti.tr { top: 10px; right: 10px; transform: rotate(115deg); }
    .confetti.bl { bottom: 84px; left: 10px; transform: rotate(-55deg); }
    .confetti.br { bottom: 84px; right: 10px; transform: rotate(-140deg); }

    .confetti-rain {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 3;
    }

    .confetti-piece {
      position: absolute;
      top: -24px;
      width: 10px;
      height: 16px;
      opacity: 0.95;
      border-radius: 2px;
      animation-name: confetti-fall;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
    }

    @keyframes confetti-fall {
      0% { transform: translateY(-24px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.9; }
    }

    .new-game-btn {
      width: min(360px, calc(100vw - 80px));
      min-height: 52px;
      margin-top: auto;
      border: 2px solid #000;
      border-radius: 8px;
      background: #fee2e2;
      color: #7f1d1d;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .win-overlay.no-timer .win-title {
      width: max-content;
      font-size: 3.5rem;
    }

    .win-time {
      margin: 0;
      color: #fff;
      position: absolute;
      top: calc(50% - 4.4rem);
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3.5rem;
      font-weight: 700;
      white-space: nowrap;
      width: max-content;
      text-shadow:
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px 2px 0 #000,
        2px 2px 0 #000;
    }

    .timer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 10px;
      padding: 8px 10px;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-input);
    }

    .timer-label {
      font-weight: 700;
    }

    .timer-meta {
      font-size: 0.95rem;
      color: #374151;
      margin-left: auto;
      margin-right: 10px;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 52px;
      height: 30px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      cursor: pointer;
      background: #d1d5db;
      border: 2px solid #000;
      border-radius: 999px;
      transition: background 0.2s ease;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      left: 3px;
      top: 3px;
      background: #fff;
      border: 2px solid #000;
      border-radius: 50%;
      transition: transform 0.2s ease;
      box-sizing: border-box;
    }

    .switch input:checked + .slider {
      background: #86efac;
    }

    .switch input:checked + .slider::before {
      transform: translateX(22px);
    }

    .hint-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 10px;
      padding: 8px 10px;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-input);
    }

    .hint-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
    }

    .hint-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .hint-icon {
      width: 24px;
      height: 24px;
      color: #f59e0b;
    }

    .hint-text {
      font-size: 1rem;
    }

    .hint-counter {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      height: 32px;
      padding: 0 8px;
      background: #f59e0b;
      color: #fff;
      font-weight: 800;
      font-size: 1.1rem;
      border-radius: 50%;
      border: 2px solid var(--border-color);
    }

    .hint-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: #00000088;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
    }

    .hint-overlay[hidden] {
      display: none;
    }

    .hint-content {
      width: min(400px, calc(100vw - 32px));
      background: var(--bg-panel);
      border: 3px solid #f59e0b;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 40px #00000060;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .hint-title {
      margin: 0;
      font-size: 1.8rem;
      color: var(--text-primary);
      text-align: center;
    }

    .hint-image {
      width: 160px;
      height: 160px;
      object-fit: contain;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      background: var(--bg-input);
      padding: 8px;
    }

    .hint-text-display {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 700;
      color: #f59e0b;
      text-align: center;
    }

    .close-hint-btn {
      width: 100%;
      min-height: 48px;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      background: #f59e0b;
      color: #fff;
      font: inherit;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .close-hint-btn:hover {
      background: #d97706;
    }

    .close-hint-btn:active {
      background: #b45309;
    }
  </style>
</head>
<body>
  <header>
    <a class="icon-btn back-link" href="index.html" aria-label="Back to home">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M14.5 5L7.5 12L14.5 19" stroke="currentColor" stroke-width="3.1" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <button id="settings-btn" class="icon-btn settings-btn" type="button" aria-label="Open settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 8.5A3.5 3.5 0 1 0 12 15.5A3.5 3.5 0 1 0 12 8.5Z" stroke="currentColor" stroke-width="2"/>
        <path d="M4 13V11L6.1 10.3C6.3 9.7 6.5 9.2 6.9 8.7L5.9 6.7L7.3 5.3L9.3 6.3C9.8 5.9 10.3 5.7 10.9 5.5L11.6 3.5H13.6L14.3 5.5C14.9 5.7 15.4 5.9 15.9 6.3L17.9 5.3L19.3 6.7L18.3 8.7C18.7 9.2 18.9 9.7 19.1 10.3L21.2 11V13L19.1 13.7C18.9 14.3 18.7 14.8 18.3 15.3L19.3 17.3L17.9 18.7L15.9 17.7C15.4 18.1 14.9 18.3 14.3 18.5L13.6 20.5H11.6L10.9 18.5C10.3 18.3 9.8 18.1 9.3 17.7L7.3 18.7L5.9 17.3L6.9 15.3C6.5 14.8 6.3 14.3 6.1 13.7L4 13Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </button>
    <p id="header-timer" class="header-timer">00:00</p>
    <div class="header-title-row">
      <h1>Memory Mode</h1>
      <p id="header-progress" class="header-progress"></p>
    </div>
  </header>
  <div id="settings-overlay" class="settings-overlay" hidden></div>
  <div id="settings-box" class="settings-box" role="dialog" aria-modal="true" aria-labelledby="settings-title" hidden>
    <h2 id="settings-title">Settings</h2>
    <p>Settings options</p>
    <div class="timer-row">
      <span class="timer-label">Hide Timer</span>
      <span id="timer-value" class="timer-meta">00:00</span>
      <label class="switch" aria-label="Hide timer">
        <input id="timer-toggle" type="checkbox" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="timer-row">
      <span class="timer-label">Music</span>
      <label class="switch" aria-label="Toggle music">
        <input id="music-toggle" type="checkbox" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="timer-row">
      <span class="timer-label">Dark Mode</span>
      <label class="switch" aria-label="Toggle dark mode">
        <input id="dark-mode-toggle" type="checkbox" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="hint-row">
      <button id="hint-btn" class="hint-btn" type="button" aria-label="Use hint">
        <svg class="hint-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M9 21h6M12 3a6 6 0 0 1 6 6c0 2.5-1.5 4-3 5.5-.5.5-1 1-1 1.5v1M12 3a6 6 0 0 0-6 6c0 2.5 1.5 4 3 5.5.5.5 1 1 1 1.5v1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="hint-text">Use Hint</span>
      </button>
      <span id="hint-counter" class="hint-counter">0</span>
    </div>
    <button id="reset-progress" class="reset-progress" type="button">Reset Progress</button>
    <button id="select-filter" class="select-filter" type="button">Select</button>
    <button id="close-settings" class="close-settings" type="button">Close</button>
  </div>
  <script>
    // Direct reset button handler - loaded immediately
    document.addEventListener('DOMContentLoaded', function() {
      const resetBtn = document.getElementById('reset-progress');
      console.log('DOMContentLoaded - Reset button:', resetBtn);
      if (resetBtn) {
        resetBtn.onclick = function(e) {
          e.preventDefault();
          e.stopPropagation();
          console.log('Reset button onclick fired!');
          alert('Reset button clicked! Check if confirmation dialog appears next.');
          const confirmed = confirm("Are you sure you want to reset your progress?");
          if (confirmed) {
            alert('Confirmed! Reloading page to reset...');
            window.location.reload();
          }
        };
        console.log('Reset button onclick handler attached');
      }
    });
  </script>
  <div id="hint-overlay" class="hint-overlay" hidden>
    <div class="hint-content">
      <h2 class="hint-title">💡 Hint</h2>
      <img id="hint-image" class="hint-image" alt="Hint image" />
      <p id="hint-text" class="hint-text-display"></p>
      <button id="close-hint" class="close-hint-btn" type="button">Got it!</button>
    </div>
  </div>
  <div id="win-overlay" class="win-overlay" hidden>
    <div id="confetti-rain" class="confetti-rain" aria-hidden="true"></div>
    <div class="win-content" role="dialog" aria-modal="true" aria-labelledby="win-title">
      <svg class="confetti tl" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2L14.2 7.2L20 9.5L14.2 11.8L12 17L9.8 11.8L4 9.5L9.8 7.2Z"/><circle cx="19" cy="4" r="2" fill="#22c55e"/><circle cx="5" cy="19" r="2" fill="#60a5fa"/></svg>
      <svg class="confetti tr" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2L14.2 7.2L20 9.5L14.2 11.8L12 17L9.8 11.8L4 9.5L9.8 7.2Z"/><circle cx="19" cy="4" r="2" fill="#22c55e"/><circle cx="5" cy="19" r="2" fill="#60a5fa"/></svg>
      <svg class="confetti bl" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2L14.2 7.2L20 9.5L14.2 11.8L12 17L9.8 11.8L4 9.5L9.8 7.2Z"/><circle cx="19" cy="4" r="2" fill="#22c55e"/><circle cx="5" cy="19" r="2" fill="#60a5fa"/></svg>
      <svg class="confetti br" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2L14.2 7.2L20 9.5L14.2 11.8L12 17L9.8 11.8L4 9.5L9.8 7.2Z"/><circle cx="19" cy="4" r="2" fill="#22c55e"/><circle cx="5" cy="19" r="2" fill="#60a5fa"/></svg>
      <h2 id="win-title" class="win-title">You Won!</h2>
      <p id="win-time" class="win-time"></p>
      <button id="new-game-btn" class="new-game-btn" type="button">New Game</button>
    </div>
  </div>
  <main>
    <section class="game-panel">
      <div class="guess-row">
        <input id="mob-input" type="text" placeholder="Type mob name" autocomplete="off" />
        <button id="submit-guess" type="button">Submit</button>
      </div>
      <p id="guess-message"></p>
      <div id="mob-board" class="mob-board"></div>
    </section>
  </main>
  <audio id="bg-music" src="assets/minecraft/lofi.mp3" preload="auto" loop></audio>
  <audio id="win-sound" src="assets/minecraft/win.mp3" preload="auto"></audio>
  <script type="module" src="./js/memory-mode/main.js"></script>
</body>
</html>
