<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MemoryCraft - Memory Mode</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: #eaf7ff;
    }

    header {
      position: relative;
      padding: 16px 20px;
      background: #39a845;
      border-bottom: 2px solid #000;
    }

    h1 {
      margin: 0;
      color: #fff;
      font-weight: 700;
      padding-left: 44px;
      padding-right: 44px;
      text-shadow:
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px 2px 0 #000,
        2px 2px 0 #000;
    }

    .icon-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      color: #000;
      border: 2px solid #000;
      border-radius: 6px;
      background: #fff;
      padding: 0;
      cursor: pointer;
    }

    .icon-btn:hover {
      background: #f2f2f2;
    }

    .back-link {
      left: 12px;
    }

    .settings-btn {
      right: 12px;
      width: 36px;
      height: 36px;
    }

    .settings-btn svg {
      width: 20px;
      height: 20px;
    }

    .settings-overlay {
      position: fixed;
      inset: 0;
      z-index: 9998;
      pointer-events: auto;
      background: #00000066;
    }

    .settings-box {
      position: fixed;
      top: 50%;
      left: 50%;
      z-index: 9999;
      pointer-events: auto;
      transform: translate(-50%, -50%);
      width: min(460px, calc(100vw - 32px));
      background: #fff;
      border: 2px solid #000;
      border-radius: 10px;
      padding: 22px;
      box-shadow: 0 10px 30px #00000040;
      color: #111;
    }

    .settings-box h2 {
      margin: 0 0 10px;
      font-size: 1.2rem;
    }

    .settings-box p {
      margin: 0 0 14px;
    }

    .close-settings {
      border: 2px solid #000;
      background: #fff;
      color: #111;
      padding: 8px 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      border-radius: 8px;
    }

    .reset-progress {
      width: 100%;
      min-height: 48px;
      margin: 6px 0 10px;
      border: 2px solid #000;
      border-radius: 8px;
      background: #fee2e2;
      color: #7f1d1d;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .select-filter {
      width: 100%;
      min-height: 48px;
      margin: 0 0 10px;
      border: 2px solid #000;
      border-radius: 8px;
      background: #dbeafe;
      color: #1e3a8a;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }


    main {
      max-width: 760px;
      margin: 24px auto;
      padding: 0 20px;
    }

    .game-panel {
      padding: 0;
    }

    .guess-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 8px 0;
      background: #eaf7ff;
    }

    #mob-input {
      flex: 1 1 260px;
      min-height: 56px;
      border: 2px solid #000;
      border-radius: 8px;
      background: #fff;
      padding: 10px 12px;
      font: inherit;
    }

    #submit-guess {
      min-height: 56px;
      border: 2px solid #000;
      border-radius: 8px;
      padding: 10px 14px;
      background: #39a845;
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    #guess-message {
      margin: 12px 0 0;
      font-weight: 700;
      min-height: 1.3em;
    }

    .mob-board {
      margin-top: 16px;
      display: grid;
      gap: 6px;
    }

    .mob-row {
      display: grid;
      grid-template-columns: 28px 1fr 58px;
      gap: 8px;
      align-items: center;
      min-height: 62px;
      padding: 6px 8px;
      border: 2px solid #000;
      border-radius: 8px;
      background: #fff;
    }

    .mob-num {
      font-weight: 700;
      color: #666;
      text-align: center;
    }

    .mob-name {
      min-height: 1.2em;
      font-weight: 700;
    }

    .mob-row:not(.guessed) .mob-name {
      color: transparent;
      user-select: none;
    }

    .mob-sprite {
      width: 56px;
      height: 56px;
      object-fit: contain;
      justify-self: end;
      opacity: 0;
    }

    .mob-row.guessed .mob-sprite {
      opacity: 1;
    }

    .mob-row.focused {
      outline: 3px solid #22c55e;
      outline-offset: 2px;
    }

  </style>
</head>
<body>
  <header>
    <a class="icon-btn back-link" href="index.html" aria-label="Back to home">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M14.5 5L7.5 12L14.5 19" stroke="currentColor" stroke-width="3.1" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <button id="settings-btn" class="icon-btn settings-btn" type="button" aria-label="Open settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 8.5A3.5 3.5 0 1 0 12 15.5A3.5 3.5 0 1 0 12 8.5Z" stroke="currentColor" stroke-width="2"/>
        <path d="M4 13V11L6.1 10.3C6.3 9.7 6.5 9.2 6.9 8.7L5.9 6.7L7.3 5.3L9.3 6.3C9.8 5.9 10.3 5.7 10.9 5.5L11.6 3.5H13.6L14.3 5.5C14.9 5.7 15.4 5.9 15.9 6.3L17.9 5.3L19.3 6.7L18.3 8.7C18.7 9.2 18.9 9.7 19.1 10.3L21.2 11V13L19.1 13.7C18.9 14.3 18.7 14.8 18.3 15.3L19.3 17.3L17.9 18.7L15.9 17.7C15.4 18.1 14.9 18.3 14.3 18.5L13.6 20.5H11.6L10.9 18.5C10.3 18.3 9.8 18.1 9.3 17.7L7.3 18.7L5.9 17.3L6.9 15.3C6.5 14.8 6.3 14.3 6.1 13.7L4 13Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </button>
    <h1>Memory Mode</h1>
  </header>
  <div id="settings-overlay" class="settings-overlay" hidden></div>
  <div id="settings-box" class="settings-box" role="dialog" aria-modal="true" aria-labelledby="settings-title" hidden>
    <h2 id="settings-title">Settings</h2>
    <p>Settings options</p>
    <button id="reset-progress" class="reset-progress" type="button">Reset</button>
    <button id="select-filter" class="select-filter" type="button">Select Mobs</button>
    <button id="close-settings" class="close-settings" type="button">Close</button>
  </div>
  <main>
    <section class="game-panel">
      <div class="guess-row">
        <input id="mob-input" type="text" placeholder="Type mob name" autocomplete="off" />
        <button id="submit-guess" type="button">Submit</button>
      </div>
      <p id="guess-message"></p>
      <div id="mob-board" class="mob-board"></div>
    </section>
  </main>
  <script>
    const settingsBtn = document.getElementById("settings-btn");
    const closeSettingsBtn = document.getElementById("close-settings");
    const resetProgressBtn = document.getElementById("reset-progress");
    const selectFilterBtn = document.getElementById("select-filter");
    const overlay = document.getElementById("settings-overlay");
    const box = document.getElementById("settings-box");
    const mobInput = document.getElementById("mob-input");
    const submitGuess = document.getElementById("submit-guess");
    const guessMessage = document.getElementById("guess-message");
    const mobBoard = document.getElementById("mob-board");
    const guessRow = document.querySelector(".guess-row");

    const MOB_RENDER_BASE = "https://mc-heads.net/mob";
    const MOB_HEAD_BASE = "https://mc-heads.net/head";
    const LOCAL_MOB_BASE = "assets/mobs";
    const MOB_FILTER_KEY = "memory_mode_mob_filters";
    const FILTER_OPTIONS = ["nether", "overworld", "end", "neutral", "passive", "hostile"];

    function getDefaultFilters() {
      return [...FILTER_OPTIONS];
    }

    function readSelectedFilters() {
      try {
        const raw = localStorage.getItem(MOB_FILTER_KEY);
        if (!raw) return getDefaultFilters();
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return getDefaultFilters();
        const valid = parsed.filter((item) => FILTER_OPTIONS.includes(item));
        return valid;
      } catch {
        return getDefaultFilters();
      }
    }

    function getMobTags(name) {
      const nether = new Set(["blaze", "ghast", "magma cube", "hoglin", "piglin", "piglin brute", "strider", "zoglin", "zombified piglin", "wither skeleton"]);
      const end = new Set(["ender dragon", "enderman", "endermite", "shulker"]);
      const passive = new Set(["allay", "armadillo", "axolotl", "bat", "camel", "cat", "chicken", "cod", "cow", "donkey", "fox", "frog", "glow squid", "goat", "horse", "llama", "mooshroom", "mule", "ocelot", "panda", "parrot", "pig", "pufferfish", "rabbit", "salmon", "sheep", "skeleton horse", "sniffer", "squid", "strider", "tadpole", "tropical fish", "turtle", "villager", "wandering trader", "wolf", "zombie horse"]);
      const neutral = new Set(["bee", "cave spider", "dolphin", "enderman", "goat", "iron golem", "llama", "piglin", "polar bear", "spider", "trader llama", "wolf", "zombified piglin"]);
      const tags = [];
      if (nether.has(name)) tags.push("nether");
      else if (end.has(name)) tags.push("end");
      else tags.push("overworld");
      if (passive.has(name)) tags.push("passive");
      if (neutral.has(name)) tags.push("neutral");
      if (!passive.has(name) && !neutral.has(name)) tags.push("hostile");
      return tags;
    }

    const mobs = [
      { name: "allay", head: "allay" },
      { name: "armadillo", head: "armadillo" },
      { name: "axolotl", head: "axolotl" },
      { name: "bat", head: "bat" },
      { name: "bee", head: "bee" },
      { name: "blaze", head: "blaze" },
      { name: "bogged", head: "bogged" },
      { name: "breeze", head: "breeze" },
      { name: "camel", head: "camel" },
      { name: "cat", head: "cat" },
      { name: "cave spider", head: "cave_spider" },
      { name: "chicken", head: "chicken" },
      { name: "cod", head: "cod" },
      { name: "cow", head: "cow" },
      { name: "creeper", head: "creeper" },
      { name: "dolphin", head: "dolphin" },
      { name: "donkey", head: "donkey" },
      { name: "drowned", head: "drowned" },
      { name: "elder guardian", head: "elder_guardian" },
      { name: "ender dragon", head: "ender_dragon" },
      { name: "enderman", head: "enderman" },
      { name: "endermite", head: "endermite" },
      { name: "evoker", head: "evoker" },
      { name: "fox", head: "fox" },
      { name: "frog", head: "frog" },
      { name: "ghast", head: "ghast" },
      { name: "glow squid", head: "glow_squid" },
      { name: "goat", head: "goat" },
      { name: "guardian", head: "guardian" },
      { name: "hoglin", head: "hoglin" },
      { name: "horse", head: "horse" },
      { name: "husk", head: "husk" },
      { name: "iron golem", head: "iron_golem" },
      { name: "llama", head: "llama" },
      { name: "magma cube", head: "magma_cube" },
      { name: "mooshroom", head: "mooshroom" },
      { name: "mule", head: "mule" },
      { name: "ocelot", head: "ocelot" },
      { name: "panda", head: "panda" },
      { name: "parrot", head: "parrot" },
      { name: "phantom", head: "phantom" },
      { name: "pig", head: "pig" },
      { name: "piglin", head: "piglin" },
      { name: "piglin brute", head: "piglin_brute" },
      { name: "pillager", head: "pillager" },
      { name: "polar bear", head: "polar_bear" },
      { name: "pufferfish", head: "pufferfish" },
      { name: "rabbit", head: "rabbit" },
      { name: "ravager", head: "ravager" },
      { name: "salmon", head: "salmon" },
      { name: "sheep", head: "sheep" },
      { name: "shulker", head: "shulker" },
      { name: "silverfish", head: "silverfish" },
      { name: "skeleton", head: "skeleton" },
      { name: "skeleton horse", head: "skeleton_horse" },
      { name: "slime", head: "slime" },
      { name: "sniffer", head: "sniffer", spriteOverride: "https://mcasset.cloud/1.20.4/assets/minecraft/textures/item/sniffer_spawn_egg.png" },
      { name: "snow golem", head: "snow_golem" },
      { name: "spider", head: "spider" },
      { name: "squid", head: "squid" },
      { name: "stray", head: "stray" },
      { name: "strider", head: "strider" },
      { name: "tadpole", head: "tadpole" },
      { name: "trader llama", head: "trader_llama" },
      { name: "tropical fish", head: "tropical_fish" },
      { name: "turtle", head: "turtle" },
      { name: "vex", head: "vex" },
      { name: "villager", head: "villager" },
      { name: "vindicator", head: "vindicator" },
      { name: "wandering trader", head: "wandering_trader" },
      { name: "warden", head: "warden" },
      { name: "witch", head: "witch" },
      { name: "wither", head: "wither" },
      { name: "wither skeleton", head: "wither_skeleton" },
      { name: "wolf", head: "wolf" },
      { name: "zoglin", head: "zoglin" },
      { name: "zombie", head: "zombie" },
      { name: "zombie horse", head: "zombie_horse" },
      { name: "zombie villager", head: "zombie_villager" },
      { name: "zombified piglin", head: "zombified_piglin" }
    ].map((mob) => ({
      ...mob,
      sprite: `${MOB_RENDER_BASE}/${mob.head}/160`
    }));

    const releaseOrder = [
      "pig", "sheep", "cow", "chicken", "squid", "zombie", "skeleton", "spider",
      "creeper", "slime", "ghast", "zombified piglin", "blaze", "magma cube", "wolf",
      "enderman", "silverfish", "cave spider", "villager", "iron golem", "snow golem",
      "mooshroom", "ocelot", "ender dragon", "wither skeleton", "wither", "witch", "bat",
      "horse", "donkey", "mule", "skeleton horse", "zombie horse", "rabbit", "endermite",
      "guardian", "elder guardian", "shulker", "polar bear", "husk", "stray", "llama",
      "vex", "vindicator", "evoker", "parrot", "dolphin", "cod", "salmon", "pufferfish",
      "tropical fish", "drowned", "turtle", "phantom", "pillager", "ravager",
      "wandering trader", "trader llama", "cat", "fox", "panda", "bee", "zoglin",
      "hoglin", "piglin", "piglin brute", "strider", "axolotl", "glow squid", "goat",
      "allay", "frog", "tadpole", "warden", "camel", "sniffer", "breeze", "bogged",
      "armadillo"
    ];
    const releaseRank = new Map(releaseOrder.map((name, index) => [name, index]));
    mobs.sort((a, b) => (releaseRank.get(a.name) ?? Number.MAX_SAFE_INTEGER) - (releaseRank.get(b.name) ?? Number.MAX_SAFE_INTEGER));

    const selectedFilters = readSelectedFilters();
    const activeMobs = mobs.filter((mob) => {
      const tags = getMobTags(mob.name);
      return selectedFilters.some((filter) => tags.includes(filter));
    });

    const guessed = new Set();
    const rowMap = new Map();

    function normalizeMobName(value) {
      return value.toLowerCase().replace(/\s+/g, " ").trim();
    }

    function getMobImageCandidates(mob) {
      const variants = [mob.head, mob.name.replace(/\s+/g, "_"), mob.head.replace(/_/g, "")];
      const urls = [];
      if (mob.spriteOverride) {
        urls.push(mob.spriteOverride);
      }
      variants.forEach((key) => {
        urls.push(`${LOCAL_MOB_BASE}/${key}.png`);
        urls.push(`${MOB_RENDER_BASE}/${key}.png`);
        urls.push(`${MOB_RENDER_BASE}/${key}`);
        urls.push(`${MOB_RENDER_BASE}/${key}/160`);
      });
      urls.push(`${MOB_HEAD_BASE}/${mob.head}/160`);
      urls.push(`${MOB_HEAD_BASE}/${mob.head}`);
      return [...new Set(urls)];
    }

    function makeFallbackImage(mob) {
      const label = mob.name.toUpperCase().slice(0, 14);
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96"><rect width="96" height="96" fill="#f3f4f6"/><rect x="4" y="4" width="88" height="88" fill="#ffffff" stroke="#111" stroke-width="4"/><text x="48" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#111">${label}</text></svg>`;
      return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
    }

    function setMobImage(img, mob) {
      const candidates = getMobImageCandidates(mob);
      let index = 0;

      function loadNext() {
        if (index >= candidates.length) {
          img.onerror = null;
          img.src = makeFallbackImage(mob);
          img.alt = `${mob.name} image fallback`;
          return;
        }
        img.src = candidates[index];
        index += 1;
      }

      img.onerror = loadNext;
      loadNext();
    }

    function renderRows() {
      mobBoard.innerHTML = "";
      if (activeMobs.length === 0) {
        guessMessage.textContent = "No mob filters selected. Open Settings > Select Mobs.";
        return;
      }
      activeMobs.forEach((mob, index) => {
        const row = document.createElement("div");
        row.className = "mob-row";
        row.innerHTML = `
          <div class="mob-num">${index + 1}</div>
          <div class="mob-name">${mob.name}</div>
          <img class="mob-sprite" alt="${mob.name} sprite" />
        `;
        mobBoard.appendChild(row);
        rowMap.set(mob.name, row);
      });
    }

    function checkMob() {
      const value = normalizeMobName(mobInput.value);
      if (!value) {
        guessMessage.textContent = "Type a mob name first.";
        return;
      }

      const mob = activeMobs.find((item) => item.name === value);
      if (!mob) {
        guessMessage.textContent = `"${value}" is not in the mob list.`;
      } else if (guessed.has(value)) {
        guessMessage.textContent = `"${value}" is already guessed.`;
      } else {
        guessed.add(value);
        const row = rowMap.get(value);
        if (row) {
          row.classList.add("guessed");
          const img = row.querySelector(".mob-sprite");
          setMobImage(img, mob);
          row.scrollIntoView({ behavior: "smooth", block: "center" });
          row.classList.add("focused");
          setTimeout(() => row.classList.remove("focused"), 1400);
        }
        guessMessage.textContent = `Correct: ${value}`;
      }

      mobInput.value = "";
      mobInput.focus();
    }

    function focusTypeBar() {
      guessRow.scrollIntoView({ behavior: "smooth", block: "start" });
      mobInput.focus();
    }

    function openSettings() {
      overlay.hidden = false;
      box.hidden = false;
    }

    function closeSettings() {
      overlay.hidden = true;
      box.hidden = true;
    }

    function resetProgress() {
      const confirmed = window.confirm("Are you sure you want to reset your progress?");
      if (!confirmed) {
        return;
      }

      guessed.clear();
      rowMap.forEach((row, name) => {
        row.classList.remove("guessed", "focused");
        const img = row.querySelector(".mob-sprite");
        if (img) {
          img.onerror = null;
          img.removeAttribute("src");
          img.alt = `${name} sprite`;
        }
      });
      guessMessage.textContent = "Progress reset.";
      mobInput.value = "";
      closeSettings();
      focusTypeBar();
    }

    settingsBtn.addEventListener("click", openSettings);
    closeSettingsBtn.addEventListener("click", closeSettings);
    resetProgressBtn.addEventListener("click", resetProgress);
    selectFilterBtn.addEventListener("click", () => {
      window.location.href = "mob-select.html";
    });
    overlay.addEventListener("click", closeSettings);
    box.addEventListener("click", (event) => {
      event.stopPropagation();
    });
    submitGuess.addEventListener("click", checkMob);
    mobInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        checkMob();
      }
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeSettings();
        return;
      }

      const typingKey = event.key.length === 1 && !event.ctrlKey && !event.metaKey && !event.altKey;
      if (!typingKey) {
        return;
      }

      const target = event.target;
      const isTypingField = target && (target.tagName === "INPUT" || target.tagName === "TEXTAREA" || target.isContentEditable);
      if (isTypingField) {
        return;
      }

      event.preventDefault();
      focusTypeBar();
      mobInput.value += event.key;
    });
    renderRows();
  </script>
</body>
</html>
