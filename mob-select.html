<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MemoryCraft - Select</title>
  <style>
    :root {
      --bg-primary: #eaf7ff;
      --bg-panel: #fff;
      --bg-button: #fff;
      --text-primary: #111;
      --border-color: #000;
    }

    body.dark-mode {
      --bg-primary: #1a1a1a;
      --bg-panel: #2a2a2a;
      --bg-button: #333;
      --text-primary: #e5e5e5;
      --border-color: #444;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: var(--bg-primary);
      transition: background-color 0.3s ease;
    }

    header {
      position: relative;
      padding: 16px 20px;
      background: #39a845;
      border-bottom: 2px solid #000;
    }

    h1 {
      margin: 0;
      color: #fff;
      font-weight: 700;
      padding-left: 44px;
      text-shadow:
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px 2px 0 #000,
        2px 2px 0 #000;
    }

    .back-link {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      color: #000;
      border: 2px solid #000;
      border-radius: 6px;
      background: #fff;
      text-decoration: none;
    }

    main {
      max-width: 760px;
      margin: 24px auto;
      padding: 0 20px;
    }

    .panel {
      background: var(--bg-panel);
      border: 2px solid var(--border-color);
      border-radius: 10px;
      padding: 16px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .btn {
      min-height: 44px;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: var(--bg-button);
      color: var(--text-primary);
    }

    .btn.primary {
      background: #39a845;
      color: #fff;
    }

    .btn.warn {
      background: #fee2e2;
      color: #7f1d1d;
    }

    .options {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .filter-section {
      margin-bottom: 16px;
    }

    .filter-heading {
      margin: 0 0 8px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      padding: 4px 0;
      border-bottom: 2px solid var(--border-color);
    }

    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      padding: 8px 10px;
      background: var(--bg-button);
      color: var(--text-primary);
      cursor: pointer;
      user-select: none;
      text-transform: capitalize;
      font-weight: 700;
    }

    .option input {
      width: 20px;
      height: 20px;
      margin: 0;
    }

    .save-btn {
      width: 100%;
      min-height: 50px;
      border: 2px solid #000;
      border-radius: 8px;
      background: #39a845;
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <a class="back-link" href="memory-mode.html" aria-label="Back to memory mode">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M14.5 5L7.5 12L14.5 19" stroke="currentColor" stroke-width="3.1" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <h1>Select</h1>
  </header>

  <main>
    <section class="panel">
      <div class="actions">
        <button id="select-all" class="btn primary" type="button">Select All</button>
        <button id="unselect-all" class="btn warn" type="button">Unselect All</button>
      </div>
      <div id="options" class="options"></div>
      <button id="save" class="save-btn" type="button">Save</button>
    </section>
  </main>

  <script type="module">
    import { FILTER_OPTIONS } from "./js/memory-mode/data.js";
    import { MOB_FILTER_KEY, readSelectedFilters } from "./js/memory-mode/storage.js";

    const optionsRoot = document.getElementById("options");
    const saveButton = document.getElementById("save");
    const selectAllButton = document.getElementById("select-all");
    const unselectAllButton = document.getElementById("unselect-all");

    const BIOME_FILTERS = ["desert", "ocean", "forest", "plains", "mountains", "swamp", "jungle", "taiga", "savanna", "badlands", "snowy"];
    const LOCATION_FILTERS = ["nether", "overworld", "end"];
    const BEHAVIOR_FILTERS = ["neutral", "passive", "hostile"];
    const TYPE_FILTERS = ["mobs", "blocks", "structures"];

    function createSection(title, filters) {
      const section = document.createElement("div");
      section.className = "filter-section";
      
      const heading = document.createElement("h3");
      heading.className = "filter-heading";
      heading.textContent = title;
      section.appendChild(heading);

      const selected = new Set(readSelectedFilters());
      
      filters.forEach((name) => {
        const label = document.createElement("label");
        label.className = "option";
        label.innerHTML = `<input type="checkbox" value="${name}" ${selected.has(name) ? "checked" : ""} /> ${name}`;
        section.appendChild(label);
      });

      return section;
    }

    function render() {
      optionsRoot.innerHTML = "";
      
      optionsRoot.appendChild(createSection("Types", TYPE_FILTERS));
      optionsRoot.appendChild(createSection("Locations", LOCATION_FILTERS));
      optionsRoot.appendChild(createSection("Mob Behavior", BEHAVIOR_FILTERS));
      optionsRoot.appendChild(createSection("Biomes (Blocks)", BIOME_FILTERS));
      
      // Add any remaining filters that don't fit in categories
      const categorized = new Set([...TYPE_FILTERS, ...LOCATION_FILTERS, ...BEHAVIOR_FILTERS, ...BIOME_FILTERS]);
      const remaining = FILTER_OPTIONS.filter(f => !categorized.has(f));
      if (remaining.length > 0) {
        optionsRoot.appendChild(createSection("Other", remaining));
      }
    }

    function setAll(checked) {
      optionsRoot.querySelectorAll('input[type="checkbox"]').forEach((el) => {
        el.checked = checked;
      });
    }

    function save() {
      const selected = Array.from(optionsRoot.querySelectorAll('input[type="checkbox"]'))
        .filter((el) => el.checked)
        .map((el) => el.value);
      localStorage.setItem(MOB_FILTER_KEY, JSON.stringify(selected));
      window.location.href = "memory-mode.html";
    }

    selectAllButton.addEventListener("click", () => setAll(true));
    unselectAllButton.addEventListener("click", () => setAll(false));
    saveButton.addEventListener("click", save);

    render();

    const DARK_MODE_KEY = "memory_mode_dark_mode_enabled";

    function readDarkModeEnabled() {
      try {
        const raw = localStorage.getItem(DARK_MODE_KEY);
        if (raw === null) return false;
        return raw === "true";
      } catch {
        return false;
      }
    }

    function applyDarkMode() {
      if (readDarkModeEnabled()) {
        document.body.classList.add("dark-mode");
      } else {
        document.body.classList.remove("dark-mode");
      }
    }

    applyDarkMode();
  </script>
</body>
</html>
