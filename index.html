<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MemoryCraft</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: #a8dcff;
    }

    header {
      position: relative;
      z-index: 2;
      padding: 16px 20px;
      background: #39a845;
      border-bottom: 2px solid #000;
    }

    h1 {
      margin: 0;
      color: #fff;
      font-weight: 700;
      text-shadow:
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px 2px 0 #000,
        2px 2px 0 #000,
        0 -2px 0 #000,
        0 2px 0 #000,
        -2px 0 0 #000,
        2px 0 0 #000;
    }

    main {
      max-width: 760px;
      margin: 32px auto;
      padding: 0 20px;
    }

    .panel {
      border: 3px solid #000;
      background: #f9f0da;
      box-shadow: 8px 8px 0 #00000030;
      padding: 20px;
    }

    .panel p {
      margin: 0 0 16px;
    }

    .mode-buttons {
      display: grid;
      gap: 12px;
    }

    .mode-btn {
      display: block;
      box-sizing: border-box;
      text-align: center;
      text-decoration: none;
      border: 2px solid #000;
      background: #fff;
      color: #111;
      width: 100%;
      min-height: 56px;
      border-radius: 10px;
      padding: 16px 14px;
      font-weight: 700;
      font-size: 1.375rem;
      line-height: 1.2;
      transition: transform 120ms ease, background-color 120ms ease;
    }

    .mode-btn:hover {
      transform: translateY(-2px);
      background: #facc15;
    }

    .mode-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <header>
    <h1>MemoryCraft</h1>
  </header>
  <main>
    <section class="panel">
      <p>Pick a game mode:</p>
      <div class="mode-buttons">
        <a class="mode-btn" href="memory-mode.html">Memory Mode</a>
        <a class="mode-btn" href="guess-mode.html">Guess Mode</a>
      </div>
    </section>
  </main>
</body>
</html>
